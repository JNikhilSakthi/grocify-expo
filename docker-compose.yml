services:
  db:
    image: postgres:17-alpine
    container_name: grocify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grocify
    ports:
      # host 5435 -> container 5432 (avoids clashing with a local Postgres on 5432)
      - "5435:5432"
    volumes:
      - grocify-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grocify"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  grocify-pgdata:
